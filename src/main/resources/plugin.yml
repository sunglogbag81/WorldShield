name: WorldShield
version: '1.0.0'
main: com.sunglogbag81.worldshield.WorldShieldPlugin
api-version: '1.21'
author: sunglogbag81
description: Simple global and region protection plugin.
commands:
  worldshield:
    aliases: [ws]
    description: Manage WorldShield regions and flags.
    usage: /<command> help
  auto-fire-ban:
    aliases: [자동차단]
    description: Automatically ban recent fire source players in front of the caller.
    usage: /<command>
permissions:
  worldshield.admin:
    description: Allows managing WorldShield.
    default: op
  worldshield.autoban.exempt:
    description: Exempts a player from fire auto-ban.
    default: op
